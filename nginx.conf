server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* to the backend API container
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Allow large file uploads (markdown files)
        client_max_body_size 20m;
        # AI summary generation can exceed nginx's 60s default when the Ollama
        # model is cold-loading
        proxy_read_timeout 180s;
    }

    # Angular client-side routing — always serve index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
