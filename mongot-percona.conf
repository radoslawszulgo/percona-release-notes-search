syncSource:
   replicaSet:
      hostAndPort: "mongod.search-percona:27017"
      username: "mongotUser"
      passwordFile: "/mongot-percona/pwfile"
      authSource: "admin"
      tls: false
      readPreference: "primaryPreferred"
storage:
   dataPath: "data/mongot"
server:
   grpc:
      address: "mongot.search-percona:27028"
      tls:
         mode: "disabled"
metrics:
   enabled: true
   address: "mongot.search-percona:9946"
healthCheck:
   address: "mongot.search-percona:8080"
logging:
   verbosity: INFO
