<header class="app-header">
  <div class="app-header__inner">
    <span class="app-header__brand">
      <span class="app-header__brand-dot"></span>
      Percona Release Notes Search
    </span>
    <nav class="app-nav">
      <a class="app-nav__link" routerLink="/search" routerLinkActive="app-nav__link--active">Search</a>
      <a class="app-nav__link" routerLink="/upload" routerLinkActive="app-nav__link--active">Upload</a>
    </nav>
    <div class="server-status" [class]="'server-status--' + serverStatus()">
      <span class="server-status__dot"></span>
      <span class="server-status__label">
        {{ serverStatus() === 'checking' ? 'Connecting…' : serverStatus() === 'online' ? 'Server online' : 'Server offline' }}
      </span>
    </div>
    <span class="app-header__tech-badge">MongoDB</span>
  </div>
</header>

<main class="app-main">
  <router-outlet />
</main>

<footer class="app-footer">
  <p>Powered by <strong>Percona</strong> &amp; <strong>mongot</strong> Vector Search</p>
</footer>
