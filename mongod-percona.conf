# mongod.conf
storage:
   dbPath: /data/db
net:
   port: 27017
   bindIp: 0.0.0.0
security:
   authorization: enabled
   keyFile: /etc/mongod-keyfile
setParameter:
   searchIndexManagementHostAndPort: mongot.search-percona:27028
   mongotHost: mongot.search-percona:27028
   skipAuthenticationToSearchIndexManagementServer: false
   useGrpcForSearch: true
replication:
   replSetName: rs0
